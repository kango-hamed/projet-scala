# ──────────────────────────────────────────────
# Configuration principale de l'application
# ──────────────────────────────────────────────

play.http.secret.key = "changeme-use-a-long-random-string-in-production"

# ── Filtres actifs ────────────────────────
play.filters.enabled = ["play.filters.cors.CORSFilter"]

# ── Configuration CORS ────────────────────────
play.filters.cors {
  pathPrefixes       = ["/"]
  allowedOrigins     = null
  allowedHttpMethods = null
}

# ── Désactiver les headers trop stricts en dev ─
play.filters.headers {
  contentSecurityPolicy = null
  frameOptions          = null
  xssProtection         = null
  contentTypeOptions    = null
}


# ── Serveur ───────────────────────────────────
play.server.http.port = 9000

# ── Chemin des données CSV ────────────────────
data.path = "../data"

# ── Configuration PostgreSQL ──────────────────
db.default {
  driver = "org.postgresql.Driver"
  url = "jdbc:postgresql://localhost:5432/universite"
  username = "postgres"
  password = "postgres"
  
  # HikariCP settings
  hikaricp {
    maximumPoolSize = 10
    minimumIdle = 5
    idleTimeout = 300000
    connectionTimeout = 20000
    maxLifetime = 1200000
  }
}

# ── Evolutions ────────────────────────────────
play.evolutions.enabled = true
play.evolutions.db.default.autoApply = true
play.evolutions.db.default.autoApplyDowns = false

# ── JWT Configuration ─────────────────────────
jwt {
  secret = "PMHjy9z9umPq+1X3fzi3tMDF+3DKhSKpRvyIf9Y1ego="
  secret = ${?JWT_SECRET}  # Override par variable d'environnement
  expiration = 86400  # 24 heures en secondes
}

# ── Sécurité Production ─────────────────────
play.http.session {
  secure = true      # Cookies uniquement en HTTPS
  httpOnly = true    # Pas d'accès JavaScript aux cookies
  sameSite = "Strict" # Protection CSRF
}

play.filters.https {
  redirectEnabled = true  # Activer en production: true
  strictTransportSecurity = "max-age=31536000; includeSubDomains"
}

# Rate limiting
ratelimiting {
  maxAttempts = 5
  windowSeconds = 900    # 15 minutes
  blockDuration = 3600   # 1 heure
}
