# ──────────────────────────────────────────────
# Configuration principale de l'application
# ──────────────────────────────────────────────

play.http.secret.key = "changeme-use-a-long-random-string-in-production"

# ── Filtres actifs ────────────────────────────
play.filters.enabled = [
  "play.filters.cors.CORSFilter",
  "play.filters.headers.SecurityHeadersFilter"
]

# ── Configuration CORS ────────────────────────
# Autorise les requêtes depuis l'app React (localhost:3000)
play.filters.cors {
  allowedOrigins     = ["http://localhost:3000", "http://localhost:5173"]
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
  allowedHttpHeaders = ["Content-Type", "Authorization", "Accept"]
  preflightMaxAge    = 3 days
  supportsCredentials = false
}

# ── Désactiver les headers trop stricts en dev ─
play.filters.headers {
  contentSecurityPolicy = null
  frameOptions          = null
  xssProtection         = null
}

# ── Serveur ───────────────────────────────────
play.server.http.port = 9000

# ── Chemin des données CSV ────────────────────
data.path = "../data"

# ── Configuration PostgreSQL ──────────────────
db.default {
  driver = "org.postgresql.Driver"
  url = "jdbc:postgresql://localhost:5432/universite"
  username = "postgres"
  password = "postgres"
  
  # HikariCP settings
  hikaricp {
    maximumPoolSize = 10
    minimumIdle = 5
    idleTimeout = 300000
    connectionTimeout = 20000
    maxLifetime = 1200000
  }
}

# ── Evolutions ────────────────────────────────
play.evolutions.enabled = true
play.evolutions.db.default.autoApply = true
play.evolutions.db.default.autoApplyDowns = true
